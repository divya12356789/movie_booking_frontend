<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinemagic | Edit Profile</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .profile-layout {
            display: grid;
            gap: 22px;
            max-width: 920px;
            margin: 0 auto;
        }

        .profile-card {
            display: grid;
            gap: 18px;
            padding: 24px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.88), rgba(2, 6, 23, 0.96));
            box-shadow: 0 24px 60px rgba(2, 6, 23, 0.42);
        }

        .profile-kicker {
            color: #f59e0b;
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            margin: 0;
        }

        .profile-title {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            color: #ffffff;
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1.06;
        }

        .profile-copy {
            margin: 0;
            color: #cbd5e1;
            line-height: 1.8;
        }

        .profile-summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
        }

        .profile-summary-item {
            padding: 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(148, 163, 184, 0.12);
            display: grid;
            gap: 6px;
        }

        .profile-summary-item span {
            color: #94a3b8;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .profile-summary-item strong {
            color: #ffffff;
            font-size: 1rem;
            line-height: 1.6;
        }

        .profile-info-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        @media (max-width: 860px) {
            .profile-summary-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="top-nav">
            <a class="brand" href="index.html" aria-label="Cinemagic home">
                <span class="brand-word">cine</span>
                <span class="brand-accent">magic</span>
            </a>
            <form id="siteSearchForm" class="header-search" role="search">
                <label class="sr-only" for="siteSearchInput">Search movies</label>
                <input id="siteSearchInput" name="search" type="search" placeholder="Search for movies by title, genre or ID">
            </form>
            <div class="header-actions">
                <nav class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="movies.html">Movies</a>
                    <a href="history.html">History</a>
                </nav>
                <a class="button header-login-button" href="login.html">Login</a>
            </div>
        </header>

        <section class="panel profile-layout">
            <div id="statusBox" class="status" aria-live="polite"></div>

            <section id="profileInfoSection" class="profile-card">
                <div>
                    <p class="profile-kicker">Profile Info</p>
                    <h1 class="profile-title">Your profile</h1>
                    <p class="profile-copy">Review your saved details before making changes.</p>
                </div>

                <div class="profile-summary-grid">
                    <div class="profile-summary-item">
                        <span>Name</span>
                        <strong id="profileNameLabel">-</strong>
                    </div>
                    <div class="profile-summary-item">
                        <span>Age</span>
                        <strong id="profileAgeLabel">-</strong>
                    </div>
                    <div class="profile-summary-item">
                        <span>Email</span>
                        <strong id="profileEmailLabel">-</strong>
                    </div>
                    <div class="profile-summary-item">
                        <span>Phone</span>
                        <strong id="profilePhoneLabel">-</strong>
                    </div>
                </div>

                <div class="profile-info-actions">
                    <a class="button" href="#profileEditSection">Edit Profile</a>
                    <a class="button secondary" href="index.html">Back to Home</a>
                </div>
            </section>

            <section id="profileEditSection" class="profile-card">
                <div>
                    <p class="profile-kicker">Edit Profile</p>
                    <h2 class="profile-title">Update your details</h2>
                    <p class="profile-copy">Change your name, age, email, or phone number and save the updated profile.</p>
                </div>

                <form id="editProfileForm" class="form-grid">
                    <div class="form-group">
                        <label for="nameInput">Name</label>
                        <input id="nameInput" type="text" required>
                    </div>

                    <div class="form-group">
                        <label for="ageInput">Age</label>
                        <input id="ageInput" type="number" min="1" max="120" required>
                    </div>

                    <div class="form-group">
                        <label for="emailInput">Email</label>
                        <input id="emailInput" type="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phoneInput">Phone</label>
                        <input id="phoneInput" type="tel" inputmode="numeric" required>
                    </div>

                    <div class="button-row">
                        <button id="saveButton" class="button" type="submit">Save Profile</button>
                        <a class="button secondary" href="#profileInfoSection">Back to Profile</a>
                    </div>
                </form>
            </section>
        </section>
    </div>

    <script src="js/api.js"></script>
    <script>
        const statusBox = document.getElementById("statusBox");
        const editProfileForm = document.getElementById("editProfileForm");
        const saveButton = document.getElementById("saveButton");
        const nameInput = document.getElementById("nameInput");
        const ageInput = document.getElementById("ageInput");
        const emailInput = document.getElementById("emailInput");
        const phoneInput = document.getElementById("phoneInput");
        const profileNameLabel = document.getElementById("profileNameLabel");
        const profileAgeLabel = document.getElementById("profileAgeLabel");
        const profileEmailLabel = document.getElementById("profileEmailLabel");
        const profilePhoneLabel = document.getElementById("profilePhoneLabel");
        const siteSearchForm = document.getElementById("siteSearchForm");
        const siteSearchInput = document.getElementById("siteSearchInput");

        function showStatus(message, type) {
            statusBox.textContent = message;
            statusBox.className = `status ${type}`;
        }

        function setProfileSummary(profile) {
            profileNameLabel.textContent = profile.name || "Not set";
            profileAgeLabel.textContent = profile.age || "Not set";
            profileEmailLabel.textContent = profile.email || "Not set";
            profilePhoneLabel.textContent = profile.phoneNumber || "Not set";
        }

        function loadProfileForm() {
            if (!isAuthenticated()) {
                showStatus("Please login first.", "error");
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 900);
                return;
            }

            const profile = getCurrentUserProfile();
            setProfileSummary(profile);
            nameInput.value = profile.name || "";
            ageInput.value = profile.age || "";
            emailInput.value = profile.email || "";
            phoneInput.value = profile.phoneNumber || "";
        }

        siteSearchForm.addEventListener("submit", function (event) {
            event.preventDefault();
            const searchTerm = siteSearchInput.value.trim();
            const params = new URLSearchParams();
            if (searchTerm) {
                params.set("search", searchTerm);
            }
            const query = params.toString();
            window.location.href = query ? `movies.html?${query}` : "movies.html";
        });

        editProfileForm.addEventListener("submit", async function (event) {
            event.preventDefault();

            const currentProfile = getCurrentUserProfile();
            const ageValue = Number(ageInput.value);

            if (!Number.isFinite(ageValue) || ageValue <= 0) {
                showStatus("Please enter a valid age.", "error");
                return;
            }

            const updatedProfile = {
                id: currentProfile.id,
                name: nameInput.value.trim(),
                age: ageValue,
                email: emailInput.value.trim(),
                phoneNumber: phoneInput.value.trim(),
                marriageStatus: currentProfile.marriageStatus
            };

            saveButton.disabled = true;
            showStatus("Saving profile...", "info");

            try {
                const savedProfile = await updateCurrentUserProfile(updatedProfile);
                setCurrentUserProfile(savedProfile || updatedProfile);
                setProfileSummary(getCurrentUserProfile());
                showStatus("Profile updated successfully.", "success");
                setTimeout(() => {
                    window.location.href = "edit-profile.html#profileInfoSection";
                }, 700);
            } catch (error) {
                showStatus(error.message || "Could not update profile.", "error");
            } finally {
                saveButton.disabled = false;
            }
        });

        document.addEventListener("DOMContentLoaded", loadProfileForm);
    </script>
</body>
</html>
